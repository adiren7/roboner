services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ner-benchmark-backend
    volumes:
      - ./backend/data:/app/data
    expose:
      - "8000"
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ner-benchmark-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

